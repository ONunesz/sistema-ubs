<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UBS - Painel de Chamadas</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f0f2f5; overflow: hidden; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .painel-principal { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .chamada-box { background: white; padding: 50px; border-radius: 30px; box-shadow: 0 20px-50px rgba(0,0,0,0.3); width: 80%; border-bottom: 15px solid var(--verde-ubs); animation: pular 0.5s infinite alternate; }
        @keyframes pular { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .nome-paciente { font-size: 7rem; color: var(--verde-ubs); margin: 0; font-weight: 900; text-transform: uppercase; }
        .setor-destino { font-size: 3.5rem; color: #555; margin-top: 20px; font-weight: bold; }
        .rodape { background: var(--verde-ubs); color: white; padding: 20px; font-size: 1.5rem; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="painel-principal">
        <div id="boxChamada" class="chamada-box" style="display: none;">
            <div style="font-size: 2rem; color: #888; font-weight: bold; margin-bottom: 10px;">PRÓXIMO PACIENTE:</div>
            <h1 class="nome-paciente" id="nomeExibido">---</h1>
            <div class="setor-destino" id="setorExibido">---</div>
        </div>
        
        <div id="msgEspera" style="font-size: 3rem; color: #999;">Aguardando próximo atendimento...</div>
    </div>

    <div class="rodape">
        UBS - UNIDADE BÁSICA DE SAÚDE | Mantenha seus documentos em mãos
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            authDomain: "sistemaubs-c7a44.firebaseapp.com",
            projectId: "sistemaubs-c7a44",
            storageBucket: "sistemaubs-c7a44.firebasestorage.app",
            messagingSenderId: "685343776891",
            appId: "1:685343776891:web:a09fc98eff4a0422af02de"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variável para não repetir o som se for o mesmo chamado
        let ultimoTimestamp = 0;

        // Ouvir quando o médico clica em "CHAMAR"
        db.ref('chamadaAtual').on('value', snapshot => {
            const dados = snapshot.val();
            
            if (dados && dados.timestamp !== ultimoTimestamp) {
                ultimoTimestamp = dados.timestamp;
                
                // Mostra o box e esconde a mensagem de espera
                document.getElementById('boxChamada').style.display = 'block';
                document.getElementById('msgEspera').style.display = 'none';

                // Atualiza os nomes na tela
                document.getElementById('nomeExibido').innerText = dados.nome;
                document.getElementById('setorExibido').innerText = dados.setor;

                // Toca o som de chamada
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                audio.play().catch(e => console.log("Erro ao tocar som: Navegador exige interação prévia."));

                // Falar o nome do paciente (Opcional - Voz do Google)
                const fala = new SpeechSynthesisUtterance(`Paciente: ${dados.nome}, dirigir-se ao ${dados.setor}`);
                fala.lang = 'pt-BR';
                window.speechSynthesis.speak(fala);
            }
        });
    </script>
</body>
</html>
