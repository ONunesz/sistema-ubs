<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UBS - Sistema de Chamadas</title>
    <style>
        /* ESTILO COMPLETO BASEADO NA IMAGEM image_a7a607.png */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Botão de Áudio Superior */
        .audio-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        header h1 { color: #2e5339; margin: 0; font-size: 2.5rem; }
        header p { color: #666; margin: 0; }

        /* Container que divide a tela em duas colunas */
        .conteudo {
            display: flex;
            flex: 1;
            padding: 20px 40px;
            gap: 30px;
            align-items: flex-start;
        }

        /* Lado Esquerdo: Chamada Principal */
        .principal {
            flex: 2;
            background: white;
            border-radius: 20px;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .nome-paciente {
            font-size: 8rem;
            color: #2e5339;
            font-weight: 900;
            margin: 10px 0;
            text-transform: uppercase;
        }

        .setor-chamado {
            font-size: 3rem;
            color: #666;
            background: #f0f0f0;
            padding: 10px 40px;
            border-radius: 15px;
        }

        /* Lado Direito: Últimas Chamadas */
        .lateral {
            flex: 1;
            background: #f9fbf9;
            border-radius: 20px;
            padding: 25px;
            height: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #e0e6e0;
        }

        .lateral h2 { color: #2e5339; margin-top: 0; border-bottom: 2px solid #2e5339; padding-bottom: 10px; }

        .item-historico {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .item-historico strong { font-size: 1.4rem; color: #333; text-transform: uppercase; }
        .item-historico p { margin: 5px 0 0; color: #777; }

        /* Rodapé de Dicas */
        footer {
            background-color: #2e5339;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            margin: 20px 40px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <button class="audio-btn" id="btnSom" onclick="this.style.display='none'; audioLigado=true;">
        🔊 Ativar Áudio
    </button>

    <header>
        <h1>Sistema de Chamadas - UBS</h1>
        <p>Painel de Chamadas</p>
    </header>

    <div class="conteudo">
        <div class="principal">
            <div id="blocoChamada" style="display: none;">
                <p style="font-size: 1.5rem; color: #999; font-weight: bold;">PACIENTE CHAMADO:</p>
                <div class="nome-paciente" id="nomeTV">---</div>
                <div class="setor-chamado" id="setorTV">---</div>
            </div>
            <div id="msgAguardando" style="font-size: 2.5rem; color: #ccc;">
                Aguardando primeira chamada...
            </div>
        </div>

        <div class="lateral">
            <h2>Últimas Chamadas</h2>
            <div id="listaHistorico">
                <p style="color: #bbb;">Nenhuma chamada ainda</p>
            </div>
        </div>
    </div>

    <footer>
        💚 Dica de Saúde: Mantenha sua carteira de vacinação atualizada • Beba água regularmente
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE (image_a8807f.png)
        const firebaseConfig = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            authDomain: "sistemaubs-c7a44.firebaseapp.com",
            databaseURL: "https://sistemaubs-c7a44-default-rtdb.firebaseio.com",
            projectId: "sistemaubs-c7a44",
            storageBucket: "sistemaubs-c7a44.firebasestorage.app",
            messagingSenderId: "685343776891",
            appId: "1:685343776891:web:a09fc98eff4a0422af02de"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let ultimoTS = 0;
        let audioLigado = false;
        let historico = [];

        // ESCUTAR CHAMADAS
        db.ref('chamadaAtual').on('value', snap => {
            const data = snap.val();
            if(data && data.timestamp !== ultimoTS) {
                ultimoTS = data.timestamp;

                // Atualiza tela principal
                document.getElementById('blocoChamada').style.display = 'block';
                document.getElementById('msgAguardando').style.display = 'none';
                document.getElementById('nomeTV').innerText = data.nome;
                document.getElementById('setorTV').innerText = data.setor;

                // Som e Voz
                if(audioLigado) {
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
                    const voz = new SpeechSynthesisUtterance(data.nome + " comparecer ao " + data.setor);
                    voz.lang = 'pt-BR';
                    window.speechSynthesis.speak(voz);
                }

                // Atualiza Histórico Lateral
                historico.unshift(data);
                const lista = document.getElementById('listaHistorico');
                lista.innerHTML = "";
                historico.slice(0, 4).forEach(item => {
                    lista.innerHTML += `
                        <div class="item-historico">
                            <strong>${item.nome}</strong>
                            <p>${item.setor}</p>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
