<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UBS - Painel de Chamadas</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f0f2f5; overflow: hidden; display: flex; flex-direction: column; height: 100vh; margin: 0; font-family: sans-serif; }
        .painel-principal { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .chamada-box { background: white; padding: 50px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 85%; border-bottom: 20px solid var(--verde-ubs); animation: pulse 1.5s infinite; display: none; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .nome-paciente { font-size: 8rem; color: var(--verde-ubs); margin: 0; font-weight: 900; text-transform: uppercase; }
        .setor-destino { font-size: 4rem; color: #444; margin-top: 20px; font-weight: bold; background: #eee; padding: 10px 20px; border-radius: 15px; display: inline-block; }
        .rodape { background: var(--verde-ubs); color: white; padding: 25px; font-size: 2rem; text-align: center; font-weight: bold; }
        
        /* Botão de ativação para a Smart TV */
        #btnAtivar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer; font-size: 3rem; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="btnAtivar" onclick="this.style.display='none'">
        CLIQUE AQUI PARA ATIVAR O PAINEL <br> (Necessário para o som funcionar)
    </div>

    <div class="painel-principal">
        <div id="boxChamada" class="chamada-box">
            <div style="font-size: 2.5rem; color: #888; font-weight: bold; margin-bottom: 20px;">PACIENTE CHAMADO:</div>
            <h1 class="nome-paciente" id="nomeExibido">---</h1>
            <div class="setor-destino" id="setorExibido">---</div>
        </div>
        <div id="msgEspera" style="font-size: 4rem; color: #bbb; font-weight: bold;">AGUARDANDO CHAMADA...</div>
    </div>

    <div class="rodape">UBS - UNIDADE BÁSICA DE SAÚDE</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            authDomain: "sistemaubs-c7a44.firebaseapp.com",
            projectId: "sistemaubs-c7a44",
            storageBucket: "sistemaubs-c7a44.firebasestorage.app",
            messagingSenderId: "685343776891",
            appId: "1:685343776891:web:a09fc98eff4a0422af02de"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let ultimoTimestamp = 0;

        // Fica vigiando a 'chamadaAtual'
        db.ref('chamadaAtual').on('value', (snapshot) => {
            const dados = snapshot.val();
            if (dados && dados.timestamp !== ultimoTimestamp) {
                ultimoTimestamp = dados.timestamp;

                document.getElementById('boxChamada').style.display = 'block';
                document.getElementById('msgEspera').style.display = 'none';
                document.getElementById('nomeExibido').innerText = dados.nome;
                document.getElementById('setorExibido').innerText = dados.setor;

                // Som e Voz
                try {
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
                    const fala = new SpeechSynthesisUtterance("Paciente " + dados.nome + ", dirigir-se ao " + dados.setor);
                    fala.lang = 'pt-BR';
                    window.speechSynthesis.speak(fala);
                } catch (e) { console.log("Erro de áudio"); }
            }
        });
    </script>
</body>
</html>
