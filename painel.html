<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>TV - UBS</title><link rel="stylesheet" href="style.css"></head>
<body style="background:#f0f2f5; text-align:center; font-family:sans-serif;">
    <div id="btn" onclick="this.style.display='none'" style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;display:flex;align-items:center;justify-content:center;font-size:30px;z-index:99;cursor:pointer;">
        CLIQUE AQUI PARA LIGAR O SOM DO PAINEL
    </div>
    
    <div style="margin-top:100px;">
        <h1 style="font-size:30px; color:#888;">PROXIMO PACIENTE:</h1>
        <div id="box" style="display:none; background:white; margin:20px auto; padding:50px; width:80%; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); border-bottom:15px solid green;">
            <h1 id="nome" style="font-size:100px; color:green; margin:0; text-transform:uppercase;">---</h1>
            <h2 id="local" style="font-size:50px; color:#444; margin-top:20px;">---</h2>
        </div>
        <h1 id="espera" style="font-size:40px; color:#ccc;">AGUARDANDO CHAMADA...</h1>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            databaseURL: "https://sistemaubs-c7a44-default-rtdb.firebaseio.com",
            projectId: "sistemaubs-c7a44"
        };
        firebase.initializeApp(config);
        
        firebase.database().ref('chamadaAtual').on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('box').style.display = 'block';
                document.getElementById('espera').style.display = 'none';
                document.getElementById('nome').innerText = d.nome;
                document.getElementById('local').innerText = d.setor;

                // Toca o som e fala
                try {
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
                    const fala = new SpeechSynthesisUtterance(d.nome + ". comparecer ao . " + d.setor);
                    fala.lang = 'pt-BR';
                    window.speechSynthesis.speak(fala);
                } catch(e) { console.log("Áudio bloqueado"); }
            }
        });
    </script>
</body>
</html>
