<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UBS - Painel de Chamadas</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo fiel ao seu print image_a7aa2a.png */
        body { 
            background-color: #f0f2f5; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .painel-principal { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        .chamada-box { 
            background: white; 
            padding: 60px; 
            border-radius: 40px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.15); 
            width: 70%; 
            max-width: 900px;
            text-align: center;
            border-bottom: 25px solid #2e5339; /* Verde escuro da UBS */
            display: none; /* Inicia escondido */
        }
        .titulo-chamado {
            font-size: 3rem;
            color: #777;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .nome-paciente { 
            font-size: 10rem; 
            color: #2e5339; 
            margin: 0; 
            font-weight: 900; 
            text-transform: uppercase;
        }
        .setor-badge { 
            font-size: 5rem; 
            color: #444; 
            margin-top: 30px; 
            font-weight: bold; 
            background: #e8e8e8;
            padding: 15px 50px;
            border-radius: 20px;
            display: inline-block;
            text-transform: uppercase;
        }
        .rodape-verde { 
            background: #2e5339; 
            color: white; 
            padding: 35px; 
            font-size: 2.5rem; 
            text-align: center; 
            font-weight: bold; 
        }
        #msgEspera { font-size: 4rem; color: #bbb; font-weight: bold; }
        
        /* Botão de ativação transparente para não estragar o visual */
        #btnAtivar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); color: #2e5339; display: flex; align-items: center; justify-content: center; z-index: 999; cursor: pointer; font-size: 2.5rem; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="btnAtivar" onclick="this.style.display='none'">
        CLIQUE NA TELA PARA INICIAR O PAINEL DA UBS
    </div>

    <div class="painel-principal">
        <div id="boxChamada" class="chamada-box">
            <div class="titulo-chamado">Paciente Chamado:</div>
            <h1 class="nome-paciente" id="nomeExibido">---</h1>
            <div class="setor-badge" id="setorExibido">---</div>
        </div>
        
        <div id="msgEspera">AGUARDANDO CHAMADA...</div>
    </div>

    <div class="rodape-verde">
        UBS - UNIDADE BÁSICA DE SAÚDE
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            authDomain: "sistemaubs-c7a44.firebaseapp.com",
            databaseURL: "https://sistemaubs-c7a44-default-rtdb.firebaseio.com",
            projectId: "sistemaubs-c7a44",
            storageBucket: "sistemaubs-c7a44.firebasestorage.app",
            messagingSenderId: "685343776891",
            appId: "1:685343776891:web:a09fc98eff4a0422af02de"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let ultimoTimestamp = 0;

        db.ref('chamadaAtual').on('value', (snapshot) => {
            const dados = snapshot.val();
            if (dados && dados.timestamp !== ultimoTimestamp) {
                ultimoTimestamp = dados.timestamp;

                document.getElementById('boxChamada').style.display = 'block';
                document.getElementById('msgEspera').style.display = 'none';
                document.getElementById('nomeExibido').innerText = dados.nome;
                document.getElementById('setorExibido').innerText = dados.setor;

                try {
                    // Som de alerta
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
                    
                    // Voz chamando o paciente
                    const fala = new SpeechSynthesisUtterance("Paciente " + dados.nome + ", dirigir-se ao " + dados.setor);
                    fala.lang = 'pt-BR';
                    fala.rate = 0.9;
                    window.speechSynthesis.speak(fala);
                } catch (e) { console.log("Áudio aguardando interação."); }
            }
        });
    </script>
</body>
</html>
