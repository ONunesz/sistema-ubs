<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UBS - Relatório de Atendimentos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f0; margin: 0; padding: 20px; }
        header { background: #2e5339; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-voltar { background: white; color: #2e5339; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .stats-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; color: #666; font-size: 0.9rem; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; color: #2e5339; }

        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background: #2e5339; color: white; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; color: #333; }
        tr:hover { background: #f9fbf9; }
        
        .tag-setor { background: #e8f5e9; color: #2e5339; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
        .vazio { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>

    <header>
        <button class="btn-voltar" onclick="window.location.href='index.html'">← Voltar</button>
        <h1>Relatório de Atendimentos</h1>
        <div style="width: 100px;"></div> </header>

    <div class="stats-container">
        <div class="stat-card">
            <h3>Total de Atendimentos</h3>
            <p id="totalGeral">0</p>
        </div>
        <div class="stat-card">
            <h3>Hoje</h3>
            <p id="totalHoje">0</p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Paciente</th>
                <th>Setor Final</th>
                <th>Entrada</th>
                <th>Finalizado</th>
                <th>Data</th>
            </tr>
        </thead>
        <tbody id="tabelaCorpo">
            </tbody>
    </table>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            databaseURL: "https://sistemaubs-c7a44-default-rtdb.firebaseio.com",
            projectId: "sistemaubs-c7a44"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // Data de hoje para o filtro
        const hoje = new Date().toLocaleDateString('pt-BR');

        db.ref('historico').on('value', snap => {
            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = "";
            const dados = snap.val();

            if (!dados) {
                corpo.innerHTML = '<tr><td colspan="5" class="vazio">Nenhum atendimento finalizado no histórico.</td></tr>';
                return;
            }

            let contadorGeral = 0;
            let contadorHoje = 0;

            // Converter objeto em array e inverter para ver os mais recentes primeiro
            const lista = Object.values(dados).reverse();

            lista.forEach(item => {
                contadorGeral++;
                
                // Formatar data (se não existir no banco, usa a atual)
                const dataAtendimento = item.data || hoje;
                if(dataAtendimento === hoje) contadorHoje++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.nome}</strong></td>
                    <td><span class="tag-setor">${item.setor}</span></td>
                    <td>${item.chegada || '--:--'}</td>
                    <td>${item.finalizado || '--:--'}</td>
                    <td>${dataAtendimento}</td>
                `;
                corpo.appendChild(tr);
            });

            document.getElementById('totalGeral').innerText = contadorGeral;
            document.getElementById('totalHoje').innerText = contadorHoje;
        });
    </script>
</body>
</html>
