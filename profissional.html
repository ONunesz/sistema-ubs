<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>Médico - UBS</title><link rel="stylesheet" href="style.css"></head>
<body>
    <header><h1 id="setor">Consultório</h1><button onclick="window.location.href='index.html'">Menu</button></header>
    <div id="lista" style="padding:20px;"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            databaseURL: "https://sistemaubs-c7a44-default-rtdb.firebaseio.com",
            projectId: "sistemaubs-c7a44"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const meuSetor = localStorage.getItem('consultorioAtual') || "TRIAGEM";
        document.getElementById('setor').innerText = meuSetor;

        db.ref('fila').on('value', snap => {
            const dados = snap.val();
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            if(dados) Object.keys(dados).forEach(id => {
                if(dados[id].status === meuSetor) {
                    lista.innerHTML += `<div class="card" style="margin:10px; padding:15px; display:flex; justify-content:space-between; align-items:center;">
                        <span><strong>${dados[id].nome}</strong></span>
                        <button onclick="chamar('${dados[id].nome}')" style="background:orange; padding:10px; border-radius:5px; border:none; cursor:pointer; font-weight:bold;">CHAMAR</button>
                    </div>`;
                }
            });
        });

        function chamar(nome) {
            // Primeiro limpa a chamada antiga para a TV "sentir" o clique novo
            db.ref('chamadaAtual').remove().then(() => {
                db.ref('chamadaAtual').set({
                    nome: nome,
                    setor: meuSetor,
                    timestamp: Date.now()
                });
            });
        }
    </script>
</body>
</html>
