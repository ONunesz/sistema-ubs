<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UBS - Área do Profissional</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f4; margin: 0; padding: 0; }
        header { background: #2e5339; color: white; padding: 15px 50px; text-align: center; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .card-paciente { background: white; margin-bottom: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; border-left: 8px solid #ff9800; }
        .info b { font-size: 1.4rem; color: #2e5339; text-transform: uppercase; }
        .btn-chamar { background: #ff9800; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-finalizar { background: #2e5339; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1 id="txtSetor">UBS - Profissional</h1>
        <button onclick="window.location.href='index.html'" style="background:rgba(255,255,255,0.2); color:white; border:1px solid white; padding:8px 15px; border-radius:5px; cursor:pointer;">Sair</button>
    </header>

    <div class="container">
        <div id="listaPacientes">
            <p style="text-align:center; color:gray;">Carregando fila...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            databaseURL: "https://sistemaubs-c7a44-default-rtdb.firebaseio.com",
            projectId: "sistemaubs-c7a44"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const meuSetor = localStorage.getItem('consultorioAtual') || "TRIAGEM";
        document.getElementById('txtSetor').innerText = "SETOR: " + meuSetor;

        db.ref('fila').on('value', snap => {
            const lista = document.getElementById('listaPacientes');
            lista.innerHTML = "";
            const dados = snap.val();
            let temAlguem = false;

            if (dados) {
                Object.keys(dados).forEach(id => {
                    if (dados[id].status === meuSetor) {
                        temAlguem = true;
                        lista.innerHTML += `
                            <div class="card-paciente">
                                <div class="info">
                                    <b>${dados[id].nome}</b>
                                    <p>🕒 Chegada: ${dados[id].hora}</p>
                                    ${dados[id].destino ? `<small style="color:blue">Destino Final: ${dados[id].destino}</small>` : ''}
                                </div>
                                <div>
                                    <button class="btn-chamar" onclick="chamar('${dados[id].nome}')">CHAMAR</button>
                                    <button class="btn-finalizar" onclick="gerenciarAtendimento('${id}', ${JSON.stringify(dados[id])})">FINALIZAR</button>
                                </div>
                            </div>
                        `;
                    }
                });
            }
            if (!temAlguem) lista.innerHTML = '<p style="text-align:center; color:#999;">Ninguém aguardando aqui.</p>';
        });

        function chamar(nome) {
            db.ref('chamadaAtual').set({ nome: nome, setor: meuSetor, timestamp: Date.now() });
        }

        function gerenciarAtendimento(id, paciente) {
            // LÓGICA AUTOMÁTICA
            if (meuSetor === "TRIAGEM") {
                const destino = paciente.destino || "CONSULTÓRIO 1 (MÉDICO)"; // Se a recepção esqueceu, manda pro 1
                
                if (confirm("Encaminhar " + paciente.nome + " para " + destino + "?")) {
                    db.ref('fila').child(id).update({
                        status: destino,
                        hora: new Date().toLocaleTimeString()
                    }).then(() => alert("Paciente encaminhado!"));
                }
            } else {
                // SE JÁ ESTIVER NO CONSULTÓRIO FINAL, FINALIZA DE VEZ
                if (confirm("Finalizar atendimento de " + paciente.nome + "?")) {
                    db.ref('historico').push({
                        nome: paciente.nome,
                        setor: meuSetor,
                        chegada: paciente.hora,
                        finalizado: new Date().toLocaleTimeString()
                    });
                    db.ref('fila').child(id).remove().then(() => alert("Atendimento concluído!"));
                }
            }
        }
    </script>
</body>
</html>
