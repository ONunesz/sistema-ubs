<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UBS - Profissional (Firebase)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="tituloSetor">Consultório</h1>
        <button onclick="window.location.href='index.html'">← Sair</button>
    </header>

    <div id="listaPacientes" style="padding: 20px; max-width: 800px; margin: 0 auto;"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            authDomain: "sistemaubs-c7a44.firebaseapp.com",
            databaseURL: "https://sistemaubs-c7a44-default-rtdb.firebaseio.com",
            projectId: "sistemaubs-c7a44",
            storageBucket: "sistemaubs-c7a44.firebasestorage.app",
            messagingSenderId: "685343776891",
            appId: "1:685343776891:web:a09fc98eff4a0422af02de"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const setorAtual = localStorage.getItem('consultorioAtual') || "Geral";
        document.getElementById('tituloSetor').innerText = setorAtual;

        // Atualiza a lista em tempo real
        db.ref('fila').on('value', snapshot => {
            const listaDiv = document.getElementById('listaPacientes');
            listaDiv.innerHTML = "";
            const dados = snapshot.val();
            
            if(!dados) {
                listaDiv.innerHTML = "<p>Ninguém na fila para este setor.</p>";
                return;
            }

            Object.keys(dados).forEach(id => {
                const p = dados[id];
                if(p.status === setorAtual) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style = "margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; padding: 15px;";
                    card.innerHTML = `
                        <div><strong>${p.nome}</strong><br><small>Chegada: ${p.hora}</small></div>
                        <div>
                            <button onclick="chamar('${p.nome}')" style="background: #ffc107; border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;">CHAMAR</button>
                            <button onclick="finalizar('${id}')" style="background: #2e7d32; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; margin-left:5px;">FINALIZAR</button>
                        </div>
                    `;
                    listaDiv.appendChild(card);
                }
            });
        });

        function chamar(nomePac) {
            db.ref('chamadaAtual').set({
                nome: nomePac,
                setor: setorAtual,
                timestamp: Date.now()
            }).then(() => {
                console.log("Chamada enviada!");
            });
        }

        function finalizar(id) {
            db.ref('fila').child(id).once('value', snap => {
                const p = snap.val();
                if(setorAtual === "TRIAGEM") {
                    db.ref('fila').child(id).update({ status: p.destinoFinal });
                } else {
                    db.ref('historico').push({...p, horaFim: new Date().toLocaleTimeString()});
                    db.ref('fila').child(id).remove();
                }
            });
        }
    </script>
</body>
</html>
