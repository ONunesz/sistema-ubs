<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UBS - Área do Profissional</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f4; margin: 0; }
        header { background: #2e5339; color: white; padding: 15px 50px; text-align: center; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .card-paciente { background: white; margin-bottom: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; border-left: 8px solid #ff9800; }
        .info b { font-size: 1.4rem; color: #2e5339; text-transform: uppercase; }
        .info p { margin: 5px 0 0; color: #666; font-weight: bold; }
        .btn-chamar { background: #ff9800; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn-finalizar { background: #2e5339; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #statusVazio { text-align: center; color: #999; margin-top: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <h1 id="txtSetor">UBS - Profissional</h1>
        <button onclick="window.location.href='index.html'" style="background:rgba(255,255,255,0.2); color:white; border:1px solid white; padding:8px 15px; border-radius:5px; cursor:pointer;">Sair</button>
    </header>

    <div class="container">
        <div id="listaPacientes">
            <p id="statusVazio">Carregando fila...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            databaseURL: "https://sistemaubs-c7a44-default-rtdb.firebaseio.com",
            projectId: "sistemaubs-c7a44"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const meuSetor = localStorage.getItem('consultorioAtual') || "TRIAGEM";
        document.getElementById('txtSetor').innerText = "SETOR: " + meuSetor;

        // Variável global para guardar os dados da fila localmente e evitar erros de aspas no HTML
        let dadosFilaLocal = {};

        db.ref('fila').on('value', snap => {
            const lista = document.getElementById('listaPacientes');
            lista.innerHTML = "";
            dadosFilaLocal = snap.val() || {};
            
            let temPaciente = false;

            Object.keys(dadosFilaLocal).forEach(id => {
                const p = dadosFilaLocal[id];
                if (p.status === meuSetor) {
                    temPaciente = true;
                    
                    // Criamos o elemento via JavaScript puro para ser mais seguro
                    const card = document.createElement('div');
                    card.className = 'card-paciente';
                    card.innerHTML = `
                        <div class="info">
                            <b>${p.nome}</b>
                            <p>🕒 Chegada: ${p.hora}</p>
                            ${p.destino ? `<small style="color:blue">Destino: ${p.destino}</small>` : ''}
                        </div>
                        <div>
                            <button class="btn-chamar" onclick="chamar('${p.nome}')">CHAMAR</button>
                            <button class="btn-finalizar" onclick="gerenciarAtendimento('${id}')">FINALIZAR</button>
                        </div>
                    `;
                    lista.appendChild(card);
                }
            });

            if (!temPaciente) {
                lista.innerHTML = '<p id="statusVazio">Nenhum paciente aguardando neste setor.</p>';
            }
        });

        function chamar(nome) {
            db.ref('chamadaAtual').set({ 
                nome: nome, 
                setor: meuSetor, 
                timestamp: Date.now() 
            });
        }

        function gerenciarAtendimento(id) {
            const p = dadosFilaLocal[id];
            if (!p) return;

            if (meuSetor === "TRIAGEM") {
                const destinoParaEnviar = p.destino || "CONSULTÓRIO 1 (MÉDICO)";
                
                if (confirm("Encaminhar " + p.nome + " para " + destinoParaEnviar + "?")) {
                    db.ref('fila').child(id).update({
                        status: destinoParaEnviar,
                        hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
                    }).then(() => alert("Encaminhado!"));
                }
            } else {
                if (confirm("Finalizar atendimento de " + p.nome + "?")) {
                    // Salva no Histórico
                    db.ref('historico').push({
                        nome: p.nome,
                        setor: meuSetor,
                        chegada: p.hora,
                        finalizado: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
                    });
                    // Remove da Fila
                    db.ref('fila').child(id).remove().then(() => alert("Concluído!"));
                }
            }
        }
    </script>
</body>
</html>
