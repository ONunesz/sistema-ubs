<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UBS - Recepção (Firebase)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Recepção de Pacientes</h1>
        <button onclick="window.location.href='index.html'">← Menu</button>
    </header>

    <div class="container" style="flex-direction: column; align-items: center; padding-top: 20px;">
        <div class="card" style="max-width: 500px; padding: 30px;">
            <label>Nome do Paciente:</label>
            <input type="text" id="nomePac" style="width:100%; padding:10px; margin: 10px 0;">

            <div style="background: #e8f5e9; padding: 15px; border-radius: 8px; margin: 10px 0;">
                <input type="checkbox" id="checkTriagem" checked>
                <label for="checkTriagem">Passar pela Triagem primeiro?</label>
            </div>

            <label>Encaminhar para:</label>
            <select id="destinoPac" style="width:100%; padding:10px; margin: 10px 0;">
                <option value="CONSULTÓRIO 1 (MÉDICO)">🩺 Consultório 1 (Médico)</option>
                <option value="CONSULTÓRIO 3 (ENFERMEIRA)">💉 Consultório 3 (Enfermeira)</option>
                <option value="CONSULTÓRIO 4 (ENFERMEIRA)">👩‍⚕️ Consultório 4 (Enfermeira)</option>
                <option value="CONSULTÓRIO ODONTOLÓGICO">🦷 Consultório Odontológico</option>
                <option value="EMAESM">🧠 EMAESM</option>
            </select>

            <button class="btn-acessar" onclick="cadastrar()">CADASTRAR NO SISTEMA</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-ttiUVBPAbDpJu627YtXON5xNmrx6waY",
            authDomain: "sistemaubs-c7a44.firebaseapp.com",
            projectId: "sistemaubs-c7a44",
            storageBucket: "sistemaubs-c7a44.firebasestorage.app",
            messagingSenderId: "685343776891",
            appId: "1:685343776891:web:a09fc98eff4a0422af02de"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function cadastrar() {
            const nome = document.getElementById('nomePac').value;
            const precisaTriagem = document.getElementById('checkTriagem').checked;
            const destinoFinal = document.getElementById('destinoPac').value;

            if(!nome) return alert("Digite o nome!");

            const novo = {
                id: Date.now(),
                nome: nome,
                status: precisaTriagem ? "TRIAGEM" : destinoFinal,
                destinoFinal: destinoFinal,
                hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
            };

            db.ref('fila').child(novo.id).set(novo).then(() => {
                alert("Paciente cadastrado com sucesso!");
                document.getElementById('nomePac').value = "";
            });
        }
    </script>
</body>
</html>
